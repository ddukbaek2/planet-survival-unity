<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a12;
      overflow: hidden;
    }
    #unity-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* 가로가 더 긴(또는 정사각) 화면: 가로를 항상 꽉 채우고(좌우 필러박스 없음),
       세로는 게임 비율(16:10)로 계산하되 화면 높이를 넘지 않게 한다.
       화면이 16:10 보다 세로로 여유가 있으면 위아래로 동일한 레터박스가 생긴다(세로 중앙 정렬).
       세로 길이는 실제 보이는 뷰포트 높이(--vh)를 사용해 모바일 주소창 문제를 회피한다. */
    #unity-canvas {
      width: 100vw;
      height: min(calc(100vw / 1.6), calc(var(--vh, 1vh) * 100));
      background: #000000;
      display: block;
    }
    /* 세로가 더 긴 화면: 16:10(1280x800) 기준을 버리고 세로전용 게임처럼 화면 전체를 채운다. */
    @media (max-aspect-ratio: 1 / 1) {
      #unity-canvas {
        width: 100vw;
        height: calc(var(--vh, 1vh) * 100);
      }
    }
    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #cfd2da;
      font-family: sans-serif;
    }
    #unity-progress-bar-empty {
      width: 240px;
      height: 14px;
      margin-top: 12px;
      background: #22242c;
      border-radius: 7px;
      overflow: hidden;
    }
    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: #3aa0a8;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div>로딩 중...</div>
      <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
    </div>
  </div>
  <script>
    // 모바일 브라우저에서 실제 보이는 뷰포트 높이를 --vh 로 반영(주소창 표시/숨김 대응).
    function setViewportHeight() {
      document.documentElement.style.setProperty("--vh", (window.innerHeight * 0.01) + "px");
    }
    setViewportHeight();
    window.addEventListener("resize", setViewportHeight);
    window.addEventListener("orientationchange", setViewportHeight);

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
    var config = {
      dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
      frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
      // 내부 렌더 버퍼를 브라우저 실제 해상도(devicePixelRatio)에 맞춘다.
      devicePixelRatio: window.devicePixelRatio || 1,
    };

    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");

    // 로딩 실패 시 화면에 원인을 표시한다(iOS 등 콘솔 접근이 어려운 환경 진단용).
    function showLoadError(message) {
      loadingBar.style.display = "block";
      loadingBar.innerHTML =
        "<div style=\"color:#ff6b6b;max-width:82vw;word-break:break-word;white-space:pre-wrap;line-height:1.5;\">" +
        "로딩 오류\n" + message + "</div>";
    }
    window.addEventListener("error", function (event) {
      var location = event && event.filename ? "\n" + event.filename + ":" + event.lineno : "";
      showLoadError((event && event.message ? event.message : "unknown error") + location);
    });
    window.addEventListener("unhandledrejection", function (event) {
      var reason = event && event.reason;
      showLoadError("promise: " + (reason && reason.message ? reason.message : reason));
    });

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onerror = function () {
      showLoadError("로더 스크립트를 불러오지 못했습니다: " + loaderUrl);
    };
    script.onload = () => {
      try {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          showLoadError(message);
        });
      } catch (exception) {
        showLoadError(exception && exception.message ? exception.message : ("" + exception));
      }
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
